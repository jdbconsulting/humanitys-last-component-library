# Project-wide configuration for the be-done-with-it-passives library.
#
# Settings live here so they can be hand-edited without touching any
# generator script. Loaded by stdlib `tomllib` (Python >= 3.11).


# --- house-footprints.json merge ----------------------------------------
#
# `build/intermediate/footprints/house-footprints.json` is built by merging every
# `build/intermediate/footprints/*-footprints.json` file produced by the per-vendor
# generator scripts. When two or more vendor JSONs contribute a row with
# the same `name` (e.g. Samsung CL and TDK CGA both define CAPC1005X50N
# because the body geometry is shared, even though their terminal
# lengths could in principle differ), the row from the vendor that
# appears earlier in `priority` wins. The losing rows are dropped
# silently; the merge script logs a per-conflict tally on stderr so
# the priority list can be checked.
#
# Vendor keys are the per-vendor file basename without the trailing
# `-footprints.json` suffix:
#
#   build/intermediate/footprints/panasonic-erj-footprints.json       -> panasonic-erj
#   build/intermediate/footprints/panasonic-era-a-footprints.json     -> panasonic-era-a
#   build/intermediate/footprints/panasonic-era-v-footprints.json     -> panasonic-era-v
#   build/intermediate/footprints/panasonic-era-p-footprints.json     -> panasonic-era-p
#   build/intermediate/footprints/samsung-capacitors-footprints.json  -> samsung-capacitors
#   build/intermediate/footprints/tdk-capacitors-footprints.json      -> tdk-capacitors
#   build/intermediate/footprints/murata-gcm-footprints.json          -> murata-gcm
#   build/intermediate/footprints/murata-grm-footprints.json          -> murata-grm
#   build/intermediate/footprints/murata-ferrite-footprints.json      -> murata-ferrite
#   build/intermediate/footprints/ohmite-kdv-footprints.json          -> ohmite-kdv
#
# Vendors not listed here still have their footprints merged in (so a
# new vendor's parts are usable immediately), but they're appended
# after the ones above in alphabetical order, lose every tie against
# a listed vendor, and the merge script prints a warning naming them
# so this list can be brought up to date.

[house_footprints]
priority = [
    "panasonic-erj",
    "panasonic-era-a",
    "panasonic-era-v",
    "panasonic-era-p",
    "ohmite-kdv",
    "samsung-capacitors",
    "tdk-capacitors",
    "murata-gcm",
    "murata-grm",
    "murata-ferrite",
]


# --- IPC-7351B pad math (house/altium_pcblib/ipc.py) --------------------
#
# Tolerances applied to the pad-extent equations of IPC-7351B §3.1.4
# (the SOIC worked example). With this repo's zero-component-tolerance
# policy (Lmin == Lmax, etc., enforced upstream by vendors/_common.py)
# the C term drops out and the RMS simplifies to sqrt(F^2 + P^2).
#
#   F : fabrication tolerance.  Per-fabricator capability for board
#       outline / pad placement. The IPC-7351B SOIC worked example
#       uses 0.10 mm; tighten if your fab guarantees better.
#   P : placement tolerance.    Pick-and-place position tolerance for
#       the assembly house. The IPC-7351B SOIC worked example uses
#       0.05 mm; tighten if your assembly partner is pre-qualified
#       for finer placement.
#
# Per-density rule rows (Tables 3-5 / 3-6 J_T, J_H, J_S, round-off,
# courtyard excess) are NOT exposed here -- they are the IPC-7351B
# standard itself and changing them would no longer be IPC-compliant.
# Edit `house/altium_pcblib/ipc.py` directly if you really need to.

[ipc]
fabrication_tolerance_mm = 0.10
placement_tolerance_mm   = 0.05


# --- HLCL-001 drawing standards (house/altium_pcblib/hlcl.py) -----------
#
# Mirrors `docs/standards/standards.tex` -- the Humanity's Last
# Component Library standards document. If you change a value here,
# update the corresponding section of the standards document and
# re-run `python build.py all` (plus `python build.py standards` if
# you also want the regenerated PDF) so the .PcbLib, the standards
# PDF, and any reviewers all see the same numbers.
#
#   pad_corner_radius_percent  : §11.2 rounded-rectangle corner radius
#                                (% of the shorter pad side).
#   solder_mask_expansion_mm   : §11.2 manual per-pad solder mask
#                                expansion. Set to 0 to inherit the
#                                board rule instead.
#   min_solder_mask_sliver_mm  : §11.2.5 minimum solder-mask sliver
#                                between adjacent pad apertures.
#                                When IPC's natural sliver falls
#                                below this, the writer overlays a
#                                Top Solder bridge region rather
#                                than shrinking the copper.
#   outline_line_width_mm      : §11.4 component outline + centroid
#                                line width on Mechanical 15.
#   max_crosshair_half_arm_mm  : §11.4 cap on each arm of the
#                                centroid crosshair (so the total
#                                cross is never longer than 2x this).
#   component_body_standoff_mm : §11.3 3D component body standoff.
#                                Chip components sit flat on the
#                                board, so 0.0 by default.

[hlcl]
pad_corner_radius_percent  = 25
solder_mask_expansion_mm   = 0.05
min_solder_mask_sliver_mm  = 0.1
outline_line_width_mm      = 0.1
max_crosshair_half_arm_mm  = 0.5
component_body_standoff_mm = 0.0


# --- 3D body / STEP geometry knobs (house/stepgen/) ---------------------
#
#   default_fillet_radius_mm       : edge-fillet radius used by the
#                                    filleted-box B-rep (CAPC, INDC,
#                                    FB bodies). Always clamped per-
#                                    box to min(L, W, H) / 4 so it
#                                    can never eat more than 1/4 of
#                                    any extent on tiny chips.
#   resc_metal_thickness_fraction  : RESC end-cap metallisation
#                                    thickness as a fraction of the
#                                    body height H. Real chip
#                                    resistors plate ~50 um regardless
#                                    of body size, so the resulting
#                                    thickness is also clamped by a
#                                    floor (next setting) and a ceiling
#                                    of H/3 and T/2.
#   resc_metal_thickness_floor_mm  : hard floor on RESC metallisation
#                                    thickness so the C-shape stays
#                                    visible on the smallest 0402
#                                    bodies.

[stepgen]
default_fillet_radius_mm      = 0.05
resc_metal_thickness_fraction = 0.10
resc_metal_thickness_floor_mm = 0.02


# --- Per-family body / terminal colours ---------------------------------
#
# 24-bit RGB triples in [0..255]. The same numbers feed two consumers:
#
#   1. `house/altium_pcblib/footprint.py`  -- packs the body colour into
#      the .PcbLib's `BodyColor3D` field (Altium's 2D fill).
#   2. `house/stepgen/colors.py`           -- divides by 255 to produce
#      the float [0..1] tuples STEP's COLOUR_RGB convention requires.
#
# Keeping a single source of truth means Altium's 2D and 3D views
# always agree on the chip's colour.
#
# `colors.default.body` is the fallback the .PcbLib writer falls back
# to when a footprint's `kind` is unknown.

[colors.default]
body        = [160, 160, 160]

[colors.capc]
body        = [184, 134,  11]   # MLCC tan          #B7860B
terminal    = [204, 204, 204]   # Sn silver         #CCCCCC

[colors.indc]
body        = [ 38,  77, 148]   # ferrite blue      #264D94
terminal    = [204, 204, 204]   # Sn silver         #CCCCCC

[colors.fb]
body        = [ 38,  77, 148]   # ferrite-bead body shares the inductor blue
terminal    = [204, 204, 204]   # Sn silver         #CCCCCC

[colors.resc]
substrate   = [158, 158, 158]   # alumina mid-grey  #9E9E9E
passivation = [ 23,  23,  23]   # near-black cover  #171717
terminal    = [128, 128, 128]   # darker end-cap    #808080
