# Project-wide configuration for the be-done-with-it-passives library.
#
# Settings live here so they can be hand-edited without touching any
# generator script. Loaded by stdlib `tomllib` (Python >= 3.11).


# --- house-footprints.json merge ----------------------------------------
#
# `build/footprints/house-footprints.json` is built by merging every
# `build/footprints/*-footprints.json` file produced by the per-vendor
# generator scripts. When two or more vendor JSONs contribute a row with
# the same `name` (e.g. Samsung CL and TDK CGA both define CAPC1005X50N
# because the body geometry is shared, even though their terminal
# lengths could in principle differ), the row from the vendor that
# appears earlier in `priority` wins. The losing rows are dropped
# silently; the merge script logs a per-conflict tally on stderr so
# the priority list can be checked.
#
# Vendor keys are the per-vendor file basename without the trailing
# `-footprints.json` suffix:
#
#   build/footprints/panasonic-resistors-footprints.json -> panasonic-resistors
#   build/footprints/samsung-capacitors-footprints.json  -> samsung-capacitors
#   build/footprints/tdk-capacitors-footprints.json      -> tdk-capacitors
#   build/footprints/murata-capacitors-footprints.json   -> murata-capacitors
#
# Vendors not listed here still have their footprints merged in (so a
# new vendor's parts are usable immediately), but they're appended
# after the ones above in alphabetical order, lose every tie against
# a listed vendor, and the merge script prints a warning naming them
# so this list can be brought up to date.

[house_footprints]
priority = [
    "panasonic-resistors",
    "samsung-capacitors",
    "tdk-capacitors",
    "murata-capacitors",
]
